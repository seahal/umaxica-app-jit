# CI/CD Pipeline for Umaxica App
name: "CI"
on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  # CI Configuration
  CI: true
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  # Version Configuration
  RUBY_VERSION: "4.0.2"
  NODE_VERSION: "24"
  # Rails Configuration
  RAILS_ENV: test
  RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
  NODE_ENV: test
  # Bundler Configuration
  BUNDLE_WITH: test
  BUNDLE_JOBS: 4
  BUNDLE_PATH: vendor/bundle
  BUNDLE_DEPLOYMENT: "true"
  BUNDLE_FROZEN: "true"
  # Region Configuration
  REGION_CODE: jp
  APEX_REGION: true
jobs:
  # ====================
  # FAST CHECKS (Lint & Security)
  # ====================
  lint-actions:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: devops-actions/actionlint@v0.1.10
  # ====================
  lint-docker:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
  security:
    name: Security Checks (Brakeman, Bundle Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1
      - name: Run Brakeman security scanner (SARIF)
        run: bundle exec brakeman -f sarif -o brakeman.sarif --no-pager --quiet
        continue-on-error: true
      - name: Upload Brakeman SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4.31.10
        with:
          sarif_file: brakeman.sarif
          category: brakeman
        continue-on-error: true
      - name: Run Brakeman (fail on issues)
        run: bundle exec brakeman -z -q --no-pager
      - name: Run bundle-audit
        run: bin/bundler-audit check --update
  gitleaks:
    name: Secret Leaks Detection
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_PATH: gitleaks.sarif
          GITLEAKS_FORMAT: sarif
          GITLEAKS_FAIL: true
      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4.31.10
        with:
          sarif_file: gitleaks.sarif
        continue-on-error: true
  # ====================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@v4.8.2
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.31.10
        with:
          languages: ruby,javascript-typescript
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4.31.10
  lint-ruby:
    name: Ruby Linting (RuboCop, ERB)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1
      - name: Run RuboCop
        run: bundle exec rubocop --fail-fast --format github
      - name: Run ERB Lint
        run: bundle exec erb_lint --lint-all
      - name: Check importmap integrity
        run: bin/importmap audit
  # ====================
  # CORE TESTS
  # ====================
  test-rails:
    name: Rails Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Rails & Rack
      RACK_ENV: test
      RAILS_MAX_THREADS: 5
      # Application
      BRAND_NAME: UMAXICA
      PORT: 3000
      # Identifiers
      SINGLETON_DEFAULT_SALT: hoge
      IDENTIFIER_REGION_CODE: "392"
      IDENTIFIER_INSTANCE_ID: "0123456789"
      # Domain URLs - APEX
      PEAK_CORPORATE_URL: com.localhost
      PEAK_SERVICE_URL: app.localhost
      PEAK_STAFF_URL: org.localhost
      # Domain URLs - Auth
      AUTH_SERVICE_URL: sign.app.localhost
      AUTH_STAFF_URL: sign.org.localhost
      TRUSTED_ORIGINS: http://sign.app.localhost,http://sign.org.localhost
      # Domain URLs - Core
      CORE_CORPORATE_URL: www.com.localhost
      CORE_SERVICE_URL: www.app.localhost
      CORE_STAFF_URL: www.org.localhost
      # Domain URLs - Docs
      DOCS_CORPORATE_URL: docs.com.localhost
      DOCS_SERVICE_URL: docs.app.localhost
      DOCS_STAFF_URL: docs.org.localhost
      # Domain URLs - News
      NEWS_CORPORATE_URL: news.com.localhost
      NEWS_SERVICE_URL: news.app.localhost
      NEWS_STAFF_URL: news.org.localhost
      # Domain URLs - Help
      HELP_CORPORATE_URL: help.com.localhost
      HELP_SERVICE_URL: help.app.localhost
      HELP_STAFF_URL: help.org.localhost
      # Domain URLs - Edge
      EDGE_CORPORATE_URL: localhost:5170
      EDGE_SERVICE_URL: localhost:5171
      EDGE_STAFF_URL: localhost:5172
      STATUS_URL: status.localhost
      ASSET_URL: asset.localhost
      # Region
      APEX_REGION: true
      GLOBAL_MODE: true
      REGION_CODE: jp
      # Valkey
      VALKEY_URL: redis://localhost:6379/0
      VALKEY_RACK_ATTACK_URL: redis://localhost:6379/1
      # PostgreSQL - Connection
      POSTGRESQL_USER: root
      POSTGRESQL_PORT: 5432
      POSTGRESQL_PASSWORD: password
      # PostgreSQL - Primary/Replica Hosts
      POSTGRESQL_UNIVERSAL_PUB: localhost
      POSTGRESQL_UNIVERSAL_SUB: localhost
      POSTGRESQL_AUDIT_PUB: localhost
      POSTGRESQL_AUDIT_SUB: localhost
      POSTGRESQL_DEFAULT_PUB: localhost
      POSTGRESQL_GUEST_PUB: localhost
      POSTGRESQL_GUEST_SUB: localhost
      POSTGRESQL_PRINCIPAL_PUB: localhost
      POSTGRESQL_PRINCIPAL_SUB: localhost
      POSTGRESQL_PROFILE_PUB: localhost
      POSTGRESQL_PROFILE_SUB: localhost
      POSTGRESQL_PREFERENCE_PUB: localhost
      POSTGRESQL_PREFERENCE_SUB: localhost
      POSTGRESQL_TOKEN_PUB: localhost
      POSTGRESQL_TOKEN_SUB: localhost
      POSTGRESQL_DOCUMENT_PUB: localhost
      POSTGRESQL_DOCUMENT_SUB: localhost
      POSTGRESQL_NEWS_PUB: localhost
      POSTGRESQL_NEWS_SUB: localhost
      POSTGRESQL_BILLING_PUB: localhost
      POSTGRESQL_BILLING_SUB: localhost
      POSTGRESQL_MESSAGE_PUB: localhost
      POSTGRESQL_MESSAGE_SUB: localhost
      POSTGRESQL_NOTIFICATION_PUB: localhost
      POSTGRESQL_NOTIFICATION_SUB: localhost
      POSTGRESQL_CABLE_PUB: localhost
      POSTGRESQL_CABLE_SUB: localhost
      POSTGRESQL_QUEUE_PUB: localhost
      POSTGRESQL_QUEUE_SUB: localhost
      POSTGRESQL_STORAGE_PUB: localhost
      POSTGRESQL_STORAGE_SUB: localhost
      POSTGRESQL_OPERATOR_PUB: localhost
      POSTGRESQL_OPERATOR_SUB: localhost
      POSTGRESQL_AVATAR_PUB: localhost
      POSTGRESQL_AVATAR_SUB: localhost
      POSTGRESQL_FINDER_PUB: localhost
      POSTGRESQL_FINDER_SUB: localhost
      POSTGRESQL_SEARCH_PUB: localhost
      POSTGRESQL_SEARCH_SUB: localhost
      # Kafka
      KAFKA_BROKERS: localhost:9092
      # Email
      RESEND_SMTP_ENDPOINT: smtp.resend.com
      RESEND_SMTP_USER_NAME: resend
      # Object Storage
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # HMAC Secret
      OCCURRENCE_HMAC_SECRET: ${{ secrets.OCCURRENCE_HMAC_SECRET }}
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping" --health-interval 10s --health-timeout 5s --health-retries
          5
      kafka:
        image: confluentinc/cp-kafka:7.9.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          CLUSTER_ID: UmaxicaCluster01
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 30s --health-timeout 10s --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1
      - name: Setup test databases
        run: bin/rails db:create db:schema:load
      - name: Run Rails tests
        run: COVERAGE=true bundle exec rails test
      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: rails-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30
          compression-level: 6
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: rails-test-logs-${{ github.sha }}
          path: |
            log/test.log
            tmp/screenshots/
          retention-days: 7
          compression-level: 9
  database-consistency:
    name: Database Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RACK_ENV: test
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      TRUSTED_ORIGINS: http://sign.app.localhost,http://sign.org.localhost
      POSTGRESQL_USER: root
      POSTGRESQL_PORT: 5432
      POSTGRESQL_PASSWORD: password
      POSTGRESQL_UNIVERSAL_PUB: localhost
      POSTGRESQL_UNIVERSAL_SUB: localhost
      POSTGRESQL_AUDIT_PUB: localhost
      POSTGRESQL_AUDIT_SUB: localhost
      POSTGRESQL_DEFAULT_PUB: localhost
      POSTGRESQL_GUEST_PUB: localhost
      POSTGRESQL_GUEST_SUB: localhost
      POSTGRESQL_PRINCIPAL_PUB: localhost
      POSTGRESQL_PRINCIPAL_SUB: localhost
      POSTGRESQL_PROFILE_PUB: localhost
      POSTGRESQL_PROFILE_SUB: localhost
      POSTGRESQL_PREFERENCE_PUB: localhost
      POSTGRESQL_PREFERENCE_SUB: localhost
      POSTGRESQL_TOKEN_PUB: localhost
      POSTGRESQL_TOKEN_SUB: localhost
      POSTGRESQL_DOCUMENT_PUB: localhost
      POSTGRESQL_DOCUMENT_SUB: localhost
      POSTGRESQL_NEWS_PUB: localhost
      POSTGRESQL_NEWS_SUB: localhost
      POSTGRESQL_BILLING_PUB: localhost
      POSTGRESQL_BILLING_SUB: localhost
      POSTGRESQL_MESSAGE_PUB: localhost
      POSTGRESQL_MESSAGE_SUB: localhost
      POSTGRESQL_NOTIFICATION_PUB: localhost
      POSTGRESQL_NOTIFICATION_SUB: localhost
      POSTGRESQL_CABLE_PUB: localhost
      POSTGRESQL_CABLE_SUB: localhost
      POSTGRESQL_QUEUE_PUB: localhost
      POSTGRESQL_QUEUE_SUB: localhost
      POSTGRESQL_STORAGE_PUB: localhost
      POSTGRESQL_STORAGE_SUB: localhost
      POSTGRESQL_OPERATOR_PUB: localhost
      POSTGRESQL_OPERATOR_SUB: localhost
      POSTGRESQL_AVATAR_PUB: localhost
      POSTGRESQL_AVATAR_SUB: localhost
      POSTGRESQL_FINDER_PUB: localhost
      POSTGRESQL_FINDER_SUB: localhost
      POSTGRESQL_SEARCH_PUB: localhost
      POSTGRESQL_SEARCH_SUB: localhost
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1
      - name: Setup test databases
        run: bin/rails db:create db:schema:load
      - name: Run database consistency checks
        run: bundle exec database_consistency
  lint-js:
    name: JavaScript Lint (oxlint + oxfmt)
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: true
      - run: vp install && vp run dev:setup
      - run: vp check
      - run: vp test
  # ====================
  # SECURITY SCANS
  # ====================
  image-scan:
    name: Container Scan (Trivy + SBOM)
    runs-on: ubuntu-24.04
    if:
      github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref ==
      'refs/heads/main')
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
      - name: Build Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: production
          tags: umaxica-app:${{ github.sha }}
          build-args: RUBY_VERSION=4.0.2
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          provenance: false
          sbom: false
      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: umaxica-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.31.10
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
      - name: Run Trivy (table format, informational)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: umaxica-app:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.20.9
        with:
          image: umaxica-app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90
          compression-level: 9

sample_telephone:
  user: sample_user
  number: "+1234567890"
  number_bidx: "sample_bidx"
  number_digest: "sample_digest"
  otp_attempts_count: 0
  otp_counter: "sample_counter"
  otp_expires_at: <%= 1.hour.from_now %>
  otp_last_sent_at: <%= 1.minute.ago %>
  otp_private_key: "sample_private_key"
  public_id: "sample_public_id"
  user_identity_telephone_status_id: <%= UserTelephoneStatus::UNVERIFIED_WITH_SIGN_UP %>
  created_at: <%= Time.current %>
  updated_at: <%= Time.current %>


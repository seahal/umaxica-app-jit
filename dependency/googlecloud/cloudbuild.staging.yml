steps:
  # ---- 1. Build assets (importmap + Propshaft) ----
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - .
      - "--target"
      - production-build
      - "-t"
      - asset-builder
      - "--file"
      - Dockerfile
    id: Build image for assets

  - name: gcr.io/cloud-builders/docker
    args:
      - "-lc"
      - |
        set -euo pipefail
        docker run --rm \
          -e SECRET_KEY_BASE=dummy \
          -e RAILS_ENV=asset \
          -e REGION_CODE=jp \
          -e APEX_REGION=true \
          -v /workspace/public:/output \
          asset-builder \
          bash -c "bundle exec rails assets:precompile && cp -r public/* /output/"
    entrypoint: bash
    id: Precompile assets
    waitFor:
      - Build image for assets

  # ---- 2. Upload assets to Cloudflare R2 ----
  # - name: "public.ecr.aws/aws-cli/aws-cli:latest"
  #   args:
  #     - "-lc"
  #     - |
  #       set -euo pipefail
  #       export AWS_REGION=auto
  #       export AWS_S3_FORCE_PATH_STYLE=true
  #       aws s3 sync public/ "s3://$_R2_BUCKET/" \
  #         --endpoint-url "$_R2_ENDPOINT" \
  #         --no-progress
  #   id: Upload assets to Cloudflare R2
  #   entrypoint: bash
  #   secretEnv:
  #     - AWS_ACCESS_KEY_ID
  #     - AWS_SECRET_ACCESS_KEY
  #   waitFor:
  #     - Precompile assets

  # ---- 3. Docker build ----
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - .
      - "--target"
      - production
      - "-t"
      - "${_IMAGE}:latest"
      - "-t"
      - "${_IMAGE}:${SHORT_SHA}"
      - "--file"
      - Dockerfile
    id: Docker build
    waitFor:
      - Precompile assets

  # ---- 4. Docker push ----
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_IMAGE}"
      - "--all-tags"
    id: Docker push
    waitFor:
      - Docker build

  # ---- 5. Deploy to Cloud Run ----
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    args:
      - "-lc"
      - |
        set -euxo pipefail
        gcloud run deploy "${_SERVICE}" \
          --image "${_IMAGE}:${SHORT_SHA}" \
          --region "${_REGION}" \
          --project "$PROJECT_ID" \
          --port 8080 \
          --memory 1024Mi \
          --cpu 1 \
          --max-instances 1 \
          --min-instances 0 \
          --cpu-throttling \
          --execution-environment gen1 \
          --ingress all \
          --allow-unauthenticated \
          --set-env-vars "RAILS_ENV=production,RAILS_LOG_TO_STDOUT=1,RAILS_SERVE_STATIC_FILES=true,SECRET_KEY_BASE=dummy_temporary_key_for_testing_only" \
          --quiet
    entrypoint: bash
    id: Deploy to Cloud Run
    waitFor:
      - Docker push

timeout: 3600s
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: asia-northeast1
  _IMAGE: asia-northeast1-docker.pkg.dev/$PROJECT_ID/umaxica-apps-jit-artifact/staging
  _SERVICE: umaxica-app-jit-staging

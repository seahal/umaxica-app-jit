# Database Consistency Configuration
# Excludes PK-related uniqueness warnings since we don't add validates :id, uniqueness: true

DatabaseConsistencyConfig:
  enabled: true

# Exclude PK uniqueness warnings (CodeIdentifiable concern handles code, not id)
UniqueIndexChecker:
  enabled: true
  exclude:
    # Operator schema
    - AdminStatus.id
    - StaffStatus.id
    - OrganizationStatus.id
    - DivisionStatus.id
    - WorkspaceStatus.id
    - StaffEmailStatus.id
    - StaffTelephoneStatus.id
    - StaffSecretStatus.id
    - StaffPasskeyStatus.id
    - StaffOneTimePasswordStatus.id
    - StaffIdentityStatus.id
    # Principal schema
    - UserStatus.id
    - ClientStatus.id
    - UserEmailStatus.id
    - UserTelephoneStatus.id
    - UserSecretStatus.id
    - UserPasskeyStatus.id
    - UserOneTimePasswordStatus.id
    - UserSecretKind.id
    - UserTokenKind.id
    - UserTokenStatus.id
    - StaffTokenKind.id
    - StaffTokenStatus.id
    - UserSocialGoogleStatus.id
    - UserSocialAppleStatus.id
    # Avatar schema
    - HandleStatus.id
    - HandleAssignmentStatus.id
    - PostStatus.id
    - PostReviewStatus.id
    - AvatarRole.id
    - AvatarPermission.id
    - AvatarCapability.id
    - AvatarOwnershipStatus.id
    - AvatarMonikerStatus.id
    - AvatarMembershipStatus.id
    # Occurrence schema
    - AreaOccurrenceStatus.id
    - DomainOccurrenceStatus.id
    - EmailOccurrenceStatus.id
    - IpOccurrenceStatus.id
    - StaffOccurrenceStatus.id
    - TelephoneOccurrenceStatus.id
    - UserOccurrenceStatus.id
    - ZipOccurrenceStatus.id
    # Preference schema
    - AppPreferenceStatus.id
    - ComPreferenceStatus.id
    - OrgPreferenceStatus.id
    - AppPreferenceLanguageOption.id
    - ComPreferenceLanguageOption.id
    - OrgPreferenceLanguageOption.id
    - AppPreferenceRegionOption.id
    - ComPreferenceRegionOption.id
    - OrgPreferenceRegionOption.id
    - AppPreferenceTimezoneOption.id
    - ComPreferenceTimezoneOption.id
    - OrgPreferenceTimezoneOption.id
    - AppPreferenceColorthemeOption.id
    - ComPreferenceColorthemeOption.id
    - OrgPreferenceColorthemeOption.id
    # News schema
    - AppTimelineStatus.id
    - ComTimelineStatus.id
    - OrgTimelineStatus.id
    - AppTimelineCategoryMaster.id
    - ComTimelineCategoryMaster.id
    - OrgTimelineCategoryMaster.id
    - AppTimelineTagMaster.id
    - ComTimelineTagMaster.id
    - OrgTimelineTagMaster.id
    # Document schema
    - AppDocumentStatus.id
    - ComDocumentStatus.id
    - OrgDocumentStatus.id
    - AppDocumentCategoryMaster.id
    - ComDocumentCategoryMaster.id
    - OrgDocumentCategoryMaster.id
    - AppDocumentTagMaster.id
    - ComDocumentTagMaster.id
    - OrgDocumentTagMaster.id
    # Guest schema
    - AppContactStatus.id
    - ComContactStatus.id
    - OrgContactStatus.id
    - AppContactCategory.id
    - ComContactCategory.id
    - OrgContactCategory.id
    - AppContactEmail.id
    - ComContactEmail.id
    - OrgContactEmail.id
    - AppContactTelephone.id
    - ComContactTelephone.id
    - OrgContactTelephone.id
    # Audit schema
    - AppDocumentAuditEvent.id
    - ComDocumentAuditEvent.id
    - OrgDocumentAuditEvent.id
    - AppDocumentAuditLevel.id
    - ComDocumentAuditLevel.id
    - OrgDocumentAuditLevel.id
    - AppPreferenceAuditEvent.id
    - ComPreferenceAuditEvent.id
    - OrgPreferenceAuditEvent.id
    - AppPreferenceAuditLevel.id
    - ComPreferenceAuditLevel.id
    - OrgPreferenceAuditLevel.id
    - AppTimelineAuditEvent.id
    - ComTimelineAuditEvent.id
    - OrgTimelineAuditEvent.id
    - AppTimelineAuditLevel.id
    - ComTimelineAuditLevel.id
    - OrgTimelineAuditLevel.id
    - StaffAuditEvent.id
    - StaffAuditLevel.id
    - UserAuditEvent.id
    - UserAuditLevel.id

# PrimaryKeyTypeChecker should now pass (all bigint)
PrimaryKeyTypeChecker:
  enabled: true

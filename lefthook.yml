pre-commit:
  parallel: true
  commands:
    pnpm_biome_check:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          pnpm run check
        else
          docker compose run core pnpm check
        fi
    ruby_rubocop:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          bundle exec rubocop
        else
          docker compose run core bundle exec rubocop
        fi
    ruby_erb_lint:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          bundle exec erb_lint -a .
        else
          docker compose run core bundle exec erb_lint -a .
        fi
    # secret-scan:
    #   run: gitleaks protect

pre-push:
  parallel: true
  commands:
    pnpm_audit:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          pnpm audit
        else
          docker compose run core pnpm audit
        fi
    ruby_audit:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          bundle exec bundler-audit check --update
        else
          docker compose run core bundle exec bundler-audit check --update
        fi
    ruby_brakeman:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          bundle exec brakeman --no-pager
        else
          docker compose run core bundle exec brakeman --no-pager
        fi
    ruby_on_rails_test:
      run: |
        #!/bin/sh
        set -eu
        if [ -f /.dockerenv ]; then
          bundle exec rails test
        else
          docker compose run core bash -c "bundle exec rails test"
        fi

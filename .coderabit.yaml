language: ruby
frameworks:
  - rails

review:
  level: detailed
  focus:
    - security
    - performance
    - test_coverage
    - maintainability

rules:
  - name: ActiveRecord callbacks
    instruction: >
      Avoid complex logic in callbacks. Prefer service objects.

  - name: Transactions
    instruction: >
      Ensure multi-record writes are wrapped in explicit transactions.

  - name: Tests
    instruction: >
      Every new behavior must include Minitest coverage.

ignore:
  - db/schema.rb
  - node_modules/**
  - vendor/**

<% default_host = ENV.fetch("POSTGRESQL_HOST", "localhost") %>
<% test_host = ENV.fetch("POSTGRESQL_TEST_HOST", ENV["POSTGRESQL_DEFAULT_PUB"] || default_host) %>
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= default_host %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 32 } %>
  port: 5432
  timeout: 30000
  username: <%= ENV.fetch("POSTGRESQL_USER", "postgres") %>
  password: <%= ENV["POSTGRESQL_PASSWORD"] %>
  lock_timeout: 2s
  statement_timeout: 2s
  advisory_locks: false
test_default: &test_default
  <<: *default
  host: <%= test_host %>
  # Keep test pool intentionally small for multi-DB setups to avoid exhausting Postgres connections.
  pool: <%= ENV.fetch("RAILS_TEST_DB_POOL", 2) %>
  timeout: 60000
  prepared_statements: false
  advisory_locks: true
  lock_timeout: 10s
  statement_timeout: 30s
development:
  guest:
    <<: *default
    database: development_guest_db
    host: <%= ENV["POSTGRESQL_GUEST_PUB"] || default_host %>
    migrations_paths: ../db/guests_migrate
  guest_replica:
    <<: *default
    replica: true
    database: development_guest_db
    host: <%= ENV["POSTGRESQL_GUEST_SUB"] || default_host %>
    migrations_paths: ../db/guests_migrate
